<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooch Bank 💋</title>
    <style>
        body { font-family: sans-serif; background: #fff0f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .bank-vault { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .user-card { margin: 15px 0; padding: 15px; border-radius: 20px; border: 2px solid #eee; }
        .bal { font-size: 2.5rem; font-weight: bold; display: block; margin: 5px 0; }
        button { border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .btn-baby { background: #ff85a2; }
        .btn-daddy { background: #4dabf7; }
        #status { font-size: 0.7rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <button onclick="handleLogin()" style="background:#ff4d94; width: auto; padding: 15px 30px;">Open Our Vault 🔐</button>
</div>

<div id="main-app" class="bank-vault" style="display:none;">
    <h2 style="color:#ff4d94; margin:0;">SMOOCH BANK 💋</h2>
    <p style="font-size:0.7rem; color:#40c057; font-weight:bold;">Interest: 0.11% Daily</p>

    <div class="user-card" style="border-color:#ff85a2;">
        <div style="color:#ff85a2; font-weight:bold;">Baby's Savings</div>
        <span class="bal" id="bal-baby">0.00</span>
        <button class="btn-baby" onclick="doDeposit('Baby')">Deposit 💋</button>
    </div>

    <div class="user-card" style="border-color:#4dabf7;">
        <div style="color:#4dabf7; font-weight:bold;">Daddy's Savings</div>
        <span class="bal" id="bal-daddy">0.00</span>
        <button class="btn-daddy" onclick="doDeposit('Daddy')">Deposit 💋</button>
    </div>

    <div id="status">Ready...</div>
</div>

<script>
    // --- KONFIGURASI ---
    const API_URL = "PASTE_URL_WEB_APP_ANDA_DISINI"; 
    const MY_PIN = "1234";

    function handleLogin() {
        const input = prompt("Enter Vault PIN:");
        if (input === MY_PIN) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            startSync();
        } else {
            alert("Access Denied!");
        }
    }

    async function startSync() {
        await refreshData();
        setInterval(refreshData, 5000);
    }

    async function refreshData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // Mengambil nilai dan pastikan jadi angka desimal
            document.getElementById('bal-baby').innerText = Number(data.Baby.balance).toFixed(2);
            document.getElementById('bal-daddy').innerText = Number(data.Daddy.balance).toFixed(2);
            document.getElementById('status').innerText = "Vault Synchronized ✅";
        } catch (err) {
            console.log("Sync Error:", err);
            document.getElementById('status').innerText = "Connecting... ⚠️";
        }
    }

    async function doDeposit(user) {
        document.getElementById('status').innerText = "Processing Deposit...";
        try {
            // Menggunakan URLSearchParams agar parameter terkirim dengan benar
            await fetch(API_URL + "?user=" + user, { 
                method: 'POST',
                mode: 'no-cors' 
            });
            
            // Tunggu sebentar lalu update layar
            setTimeout(refreshData, 1500);
        } catch (err) {
            alert("Failed to send 💋");
        }
    }
</script>

</body>
</html>
